<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study.com | Credits</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Mulish -->
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="../resources/themes.js"></script>
  <link rel="stylesheet" href="../resources/themes.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Mulish", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b14 70%);
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .sub {
      color: #c7d2fe;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .credit {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .credit strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .credit span {
      color: #a5b4fc;
      font-size: 0.9rem;
    }

    .buttons {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 26px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
    }

    .secondary {
      background: rgba(255,255,255,0.08);
    }

    footer {
      margin-top: 26px;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>credits</h1>
    <div class="sub">people & tools behind obsidian.gg</div>

    <div class="credit">
      <strong>site creator, game hoster, movies</strong>
      <span>chance scott</span>
    </div>

    <div class="credit">
      <strong>designer, website decor</strong>
      <span>Alexander Diaz</span>
    </div>

    <div class="credit">
      <strong>devs (special thanks)</strong>
      <span>chance scott, breadbb, sky, kayden, and more</span>
    </div>

    <div class="credit">
      <strong>special thanks for games</strong>
      <span>gn math, truffled, and ultimate games stash</span>
    </div>

    <div class="buttons">
      <button onclick="location.href='index.html'">home</button>
      <button class="secondary" onclick="location.href='settings.html'">settings</button>
    </div>

    <footer>© 2026 obsidian.gg</footer>
  </div>

  <!-- Leave site warning -->
  <script>
    window.addEventListener("beforeunload", function (e) {
      e.preventDefault();
      e.returnValue = "";
    });
  </script>

</body>
</html>
