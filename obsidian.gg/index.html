<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Mulish -->
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="../resources/themes.js"></script>
  <link rel="stylesheet" href="../resources/themes.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Mulish", sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b14 70%);
      color: white;
      overflow: hidden;
    }

    /* Floating particles (CSS only, VERY fast) */
    .particle {
      position: fixed;
      bottom: -20px;
      width: 4px;
      height: 4px;
      background: rgba(167, 139, 250, 0.6);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 0; }
      to { transform: translateY(-120vh); opacity: 1; }
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      padding: 48px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
    }

    #type {
      background: linear-gradient(90deg, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-right: 2px solid #a78bfa;
      padding-right: 6px;
    }

    .tagline {
      margin-top: 14px;
      color: #c7d2fe;
      font-size: 1rem;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 26px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    footer {
      margin-top: 26px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .faq-section {
      margin-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
    }

    .faq-h2 {
      font-size: 1.1rem;
      cursor: pointer;
      user-select: none;
      transition: color 0.3s ease;
      display: inline-block;
    }

    .faq-h2:hover {
      color: #a78bfa;
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 12px;
      color: #cbd5f5;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .faq-answer.show {
      max-height: 200px;
    }
  </style>
</head>
<body>

  <!-- particles.js manager -->
  <script>
    for (let i = 0; i < 35; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (8 + Math.random() * 8) + "s";
      p.style.animationDelay = Math.random() * 5 + "s";
      document.body.appendChild(p);
    }
  </script>

  <div class="container">
    <div class="card">
      <h1>
        welcome to
        <span id="type"></span>
      </h1>

      <p class="tagline">a clean unblocked games experience</p>

<div class="buttons">
  <button class="primary" onclick="location.href='math.html'">enter site</button>
  <button class="secondary" onclick="location.href='learn.html'">learn more</button>
  <button class="secondary" onclick="location.href='settings.html'">settings</button>
  <button class="secondary" onclick="location.href='credits.html'">credits</button>
  <button class="secondary" onclick="location.href='privacy.html'">privacy policy</button>
  <button class="secondary" onclick="location.href='calculus.html'">movies</button>

</div>


      <footer>© 2026 obsidian.gg</footer>
    </div>
  </div>

  <script>
    /* Leave site warning */
    window.addEventListener("beforeunload", e => {

      e.returnValue = "";
    });

    /* Typewriter (FAST) */

      "obsidian.gg.",

      "supernova.",
      "galaxy.",
      "universe.",
      "infinity.",
      "eternity.",
      "obsidian.",
      "complexity",
      "depth.",
      "mystery.",
      "power.",
      "resilience.",
      "beauty.",
      "versatility.",
      "obsidian.gg."
    ];

    const el = document.getElementById("type");
    let w = 0, c = 0, del = false;

    function loop() {
      const word = words[w];
      el.textContent = del
        ? word.slice(0, --c)
        : word.slice(0, ++c);

      if (!del && c === word.length) setTimeout(() => del = true, 900);
      if (del && c === 0) { del = false; w = (w + 1) % words.length; }

      setTimeout(loop, del ? 50 : 90);
    }
    loop();
  </script>

</body>
</html>
