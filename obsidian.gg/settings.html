<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>obsidian.gg | settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Mulish -->
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="../resources/themes.js"></script>
  <link rel="stylesheet" href="../resources/themes.css">
  <link id="favicon" rel="icon" href="favicon.ico">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Mulish", sans-serif;
    }

    :root {
      --bg: radial-gradient(circle at top, #1a1a2e, #0b0b14 70%);
      --card: rgba(255,255,255,0.05);
      --accent: #a855f7;
      --text: #ffffff;
    }

    /* THEMES */
    [data-theme="black"] {
      --bg: #020617;
      --card: #020617;
      --accent: #ffffff;
    }

    [data-theme="purple"] {
      --bg: radial-gradient(circle at top, #2a145f, #0b0b14 70%);
      --card: rgba(255,255,255,0.06);
      --accent: #a855f7;
    }

    [data-theme="miku"] {
      --bg: radial-gradient(circle at top, #22d3ee, #020617 70%);
      --card: rgba(0,255,255,0.1);
      --accent: #22d3ee;
    }

    [data-theme="orange"] {
      --bg: radial-gradient(circle at top, #ffb703, #0b0b14 70%);
      --card: rgba(255,165,0,0.1);
      --accent: #fb8500;
    }

    [data-theme="truffled"] {
      --bg: radial-gradient(circle at top, #8b4513, #0b0b14 70%);
      --card: rgba(255,255,255,0.05);
      --accent: #daa520;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      border-radius: 18px;
      padding: 36px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .sub {
      color: #c7d2fe;
      margin-bottom: 26px;
    }

    .setting {
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .setting strong {
      display: block;
      margin-bottom: 8px;
    }

    .setting span {
      font-size: 0.85rem;
      color: #a5b4fc;
    }

    input, button {
      width: 100%;
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--accent), #4f46e5);
    }

    .theme-buttons button {
      margin-top: 6px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    .row button {
      flex: 1;
    }

    footer {
      margin-top: 26px;
      font-size: 0.75rem;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>settings</h1>
  <div class="sub">customize obsidian.gg</div>

  <!-- TAB CLOAK -->
  <div class="setting">
    <strong>tab title</strong>
    <input id="tabTitle" placeholder="Enter tab title">
    <button onclick="setTitle()">apply</button>
    <span>saved automatically</span>
  </div>

  <!-- FAVICON -->
  <div class="setting">
    <strong>favicon URL</strong>
    <input id="favUrl" placeholder="paste favicon image URL">
    <button onclick="setFavicon()">apply</button>
    <span>saved automatically</span>
  </div>

  <!-- THEMES -->
  <div class="setting theme-buttons">
    <strong>theme</strong>
    <button onclick="setTheme('default')">Default</button>
    <button onclick="setTheme('black')">Black</button>
    <button onclick="setTheme('purple')">Purple</button>
    <button onclick="setTheme('miku')">Miku Beam</button>
    <button onclick="setTheme('orange')">Orange</button>
    <button onclick="setTheme('truffled')">Truffled</button>
    <span>applies instantly & saves</span>
  </div>

  <!-- ABOUT BLANK -->
  <div class="setting">
    <strong>about:blank launcher</strong>
    <button onclick="openBlank()">Launch</button>
    <span>opens obsidian.gg inside about:blank</span>
  </div>

  <div class="row">
    <button onclick="location.href='index.html'">home</button>
    <button onclick="location.href='math.html'">games</button>
  </div>

  <footer>© 2026 obsidian.gg</footer>
</div>

<script>
  /* leave site warning */
  window.addEventListener("beforeunload", e => {
    e.preventDefault();
    e.returnValue = "";
  });

  /* load saved data */
  document.documentElement.setAttribute("data-theme", localStorage.theme || "default");

  if (localStorage.tabTitle) {
    document.title = localStorage.tabTitle;
    document.getElementById("tabTitle").value = localStorage.tabTitle;
  }

  if (localStorage.favicon) {
    document.getElementById("favicon").href = localStorage.favicon;
    document.getElementById("favUrl").value = localStorage.favicon;
  }

  function setTitle() {
    const t = document.getElementById("tabTitle").value;
    if (t) {
      document.title = t;
      localStorage.tabTitle = t;
    }
  }

  function setFavicon() {
    const f = document.getElementById("favUrl").value;
    if (f) {
      document.getElementById("favicon").href = f;
      localStorage.favicon = f;
    }
  }

  function setTheme(theme) {
    localStorage.theme = theme;
    document.documentElement.setAttribute("data-theme", theme);
  }

  function openBlank() {
    const win = window.open();
    win.document.body.style.margin = "0";
    win.document.body.innerHTML =
      `<iframe src="${location.origin}" style="border:none;width:100vw;height:100vh;"></iframe>`;
  }
</script>

</body>
</html>
