      var _sw = logo_canvas.width / 1920;
      var _sh = logo_canvas.height / 1080;
      if (_percent > 1) _percent = 1;

    }

<script>
var _sortOrder = 'default';
var _allButtons = null;

function _getButtons() {
  if (!_allButtons) {
    _allButtons = Array.from(document.querySelectorAll('#gameGrid button'));
  }
  return _allButtons;
}

function setSortOrder(order) {
  _sortOrder = order;
  var btns = ['sortDefault','sortAZ','sortZA'];
  btns.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.background = 'rgba(0,0,0,0.6)';
  });
  var active = document.getElementById('sort' + order.charAt(0).toUpperCase() + order.slice(1));
  if (active) active.style.background = 'rgba(255,255,255,0.25)';
  filterGames();
}

function filterGames() {
  var query = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  var grid = document.getElementById('gameGrid');
  var noResults = document.getElementById('noResults');
  var countDisplay = document.getElementById('countDisplay');
  var buttons = _getButtons();
  
  // Filter
  var visible = buttons.filter(function(btn) {
    return !query || btn.getAttribute('data-name').indexOf(query) !== -1;
  });
  var hidden = buttons.filter(function(btn) {
    return query && btn.getAttribute('data-name').indexOf(query) === -1;
  });
  
  // Sort visible
  if (_sortOrder === 'az') {
    visible.sort(function(a, b) { return a.getAttribute('data-name').localeCompare(b.getAttribute('data-name')); });
  } else if (_sortOrder === 'za') {
    visible.sort(function(a, b) { return b.getAttribute('data-name').localeCompare(a.getAttribute('data-name')); });
  } else {
    visible.sort(function(a, b) { return parseInt(a.getAttribute('data-num')) - parseInt(b.getAttribute('data-num')); });
  }
  
  // Re-append in new order
  visible.forEach(function(btn) { btn.style.display = 'inline-block'; grid.appendChild(btn); });
  hidden.forEach(function(btn) { btn.style.display = 'none'; });
  
  // Show/hide no results
  noResults.style.display = visible.length === 0 ? 'block' : 'none';
  
  // Count
  if (query) {
    countDisplay.textContent = visible.length + ' of 177';
  } else {
    countDisplay.textContent = '';
  }
}
</script></body></html>
