<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404: Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Mulish -->
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&display=swap" rel="stylesheet">
  <script src="../resources/themes.js"></script>
  <link rel="stylesheet" href="../resources/themes.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Mulish", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      max-width: 420px;
      padding: 24px;
      background: transparent;
      border-radius: 0;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      color: var(--text);
      opacity: 0.85;
      margin-bottom: 20px;
    }

    a.primary {
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      transition: opacity 0.2s;
      display: inline-block;
    }

    a.primary:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>404: page not found</h1>
    <p>look somewhere else you cro...</p>
    <a href="index.html" class="primary">go home</a>
  </div>

</body>
</html>
